    <text x="141" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1f2933">Source Book</text>
    <text x="141" y="94" text-anchor="middle" font-family="Menlo, monospace" font-size="13" fill="#6b7280">.md · .epub · .pdf</text>
  </g>
  <text x="286" y="86" text-anchor="middle" font-family="Menlo, monospace" font-size="28" fill="#c96f2d">’</text>
  <g filter="url(#shadow)">
    <rect x="318" y="28" width="284" height="104" rx="14" fill="#1f2933" stroke="#374151"/>
    <text x="460" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#f9fafb">BookSkill Studio</text>
    <text x="460" y="88" text-anchor="middle" font-family="Menlo, monospace" font-size="13" fill="#9ca3af">demo · validate · install</text>
    <text x="460" y="112" text-anchor="middle" font-family="Menlo, monospace" font-size="12" fill="#34d399">--lang en | zh | auto</text>
  </g>
  <text x="632" y="86" text-anchor="middle" font-family="Menlo, monospace" font-size="28" fill="#c96f2d">’</text>
  <g filter="url(#shadow)">
