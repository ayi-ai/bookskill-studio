    <text x="774" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1f2933">Agent Skill</text>
    <text x="774" y="94" text-anchor="middle" font-family="Menlo, monospace" font-size="13" fill="#6b7280">SKILL.md + chapters/</text>
